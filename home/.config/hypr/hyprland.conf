$mainMod = SUPER
$terminal = alacritty
$fileManager = alacritty -e ranger
$browser = google-chrome-stable
$menu = rofi -no-lazy-grab -show drun -modi drun

exec-once = waybar

# Awesome-style app bindings
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, F, exec, $fileManager
bind = $mainMod SHIFT, W, exec, $browser

# Awesome-style WM/session bindings
bind = $mainMod CTRL, R, exec, hyprctl reload
bind = $mainMod CTRL, Q, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, Escape, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Awesome-style client bindings
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, space, fullscreen, 1
bind = $mainMod, N, movetoworkspacesilent, special:minimized
bind = $mainMod CTRL, N, togglespecialworkspace, minimized
bind = $mainMod, P, pin,
bind = $mainMod, C, centerwindow,

# Focus clients by direction
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Down, movefocus, d
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Right, movefocus, r

# Move clients by direction
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Down, movewindow, d
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Right, movewindow, r

# Resize clients by direction
binde = $mainMod CTRL, H, resizeactive, -50 0
binde = $mainMod CTRL, J, resizeactive, 0 50
binde = $mainMod CTRL, K, resizeactive, 0 -50
binde = $mainMod CTRL, L, resizeactive, 50 0
binde = $mainMod CTRL, Left, resizeactive, -50 0
binde = $mainMod CTRL, Down, resizeactive, 0 50
binde = $mainMod CTRL, Up, resizeactive, 0 -50
binde = $mainMod CTRL, Right, resizeactive, 50 0

# Workspaces mirror Awesome tags 1-8
bind = $mainMod ALT, Left, workspace, e-1
bind = $mainMod ALT, Right, workspace, e+1
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8

# Mouse bindings match Awesome's Mod+left/right drag behavior
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+ -q
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%- -q
binde = , XF86AudioRaiseVolume, exec, amixer sset Master 5%+
binde = , XF86AudioLowerVolume, exec, amixer sset Master 5%-
bind = , XF86AudioMute, exec, amixer sset Master toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86AudioNext, exec, playerctl next

env = XMODIFIERS,@im=fcitx
env = QT_IM_MODULES,wayland;fcitx;ibus
env = QT_IM_MODULE,fcitx
env = SDL_IM_MODULE,fcitx
env = GLFW_IM_MODULE,ibus
